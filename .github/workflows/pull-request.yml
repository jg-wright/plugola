name: Pull Request

on:
  pull_request:

concurrency:
  cancel-in-progress: true
  group: pr-${{ github.event.pull_request.number }}

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24, 26]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run build
      - run: npm test
